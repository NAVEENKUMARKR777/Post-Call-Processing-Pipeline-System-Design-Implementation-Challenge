version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voicebot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./migrations/001_durability_and_budgets.sql:/docker-entrypoint-initdb.d/02-001-migration.sql

  redis:
    image: redis:7-alpine
    # Persistence enabled so that a restart does not wipe rate-limit
    # counters or any in-flight Celery state. The durable source of
    # truth is Postgres (processing_tasks); this just avoids an
    # avoidable extra cold start.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
